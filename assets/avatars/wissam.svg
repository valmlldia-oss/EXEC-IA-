<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- BG prune doux -->
  <circle cx="60" cy="60" r="60" fill="#E8D8F0"/>
  <!-- Haut élégant -->
  <path d="M8,120 C15,88 35,80 60,78 C85,80 105,88 112,120Z" fill="#4F0035"/>
  <!-- Cou -->
  <rect x="54" y="65" width="12" height="15" rx="5" fill="#C8906A"/>
  <!-- Visage jeune, ovale -->
  <ellipse cx="60" cy="49" rx="21" ry="24" fill="#C8906A"/>
  <!-- Chignon haut élégant -->
  <!-- Base cheveux -->
  <path d="M39,44 C39,22 81,22 81,44 C80,33 60,30 40,34Z" fill="#1A0A08"/>
  <!-- Côtés lisses -->
  <ellipse cx="39" cy="48" rx="4" ry="12" fill="#1A0A08"/>
  <ellipse cx="81" cy="48" rx="4" ry="12" fill="#1A0A08"/>
  <!-- Chignon sur le dessus -->
  <ellipse cx="60" cy="22" rx="13" ry="9" fill="#1A0A08"/>
  <ellipse cx="60" cy="20" rx="10" ry="7" fill="#2A1010"/>
  <!-- Épingle chignon -->
  <line x1="52" y1="18" x2="68" y2="22" stroke="#C0A040" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="52" cy="18" r="2" fill="#C0A040"/>
  <!-- Quelques petites mèches -->
  <path d="M39,36 Q36,42 38,48" fill="none" stroke="#2A1010" stroke-width="2" stroke-linecap="round"/>
  <path d="M81,36 Q84,42 82,48" fill="none" stroke="#2A1010" stroke-width="2" stroke-linecap="round"/>
  <!-- Oreilles -->
  <ellipse cx="39" cy="50" rx="3.5" ry="5" fill="#B88060"/>
  <ellipse cx="81" cy="50" rx="3.5" ry="5" fill="#B88060"/>
  <!-- Petites boucles d'oreilles dorées -->
  <circle cx="39" cy="55" r="2.5" fill="#C8A030"/>
  <circle cx="81" cy="55" r="2.5" fill="#C8A030"/>
  <!-- Yeux très sombres, grands, expressifs -->
  <ellipse cx="49" cy="49" rx="7" ry="5.5" fill="white"/>
  <ellipse cx="71" cy="49" rx="7" ry="5.5" fill="white"/>
  <!-- Iris sombre -->
  <circle cx="49" cy="49" r="4.5" fill="#1A0808"/>
  <circle cx="71" cy="49" r="4.5" fill="#1A0808"/>
  <!-- Pupille -->
  <circle cx="49" cy="49" r="2.5" fill="#080402"/>
  <circle cx="71" cy="49" r="2.5" fill="#080402"/>
  <!-- Reflet lumineux -->
  <circle cx="50.8" cy="47.2" r="1.4" fill="white"/>
  <circle cx="72.8" cy="47.2" r="1.4" fill="white"/>
  <!-- Cils supérieurs -->
  <path d="M42,45 Q49,42 56,45" stroke="#1A0808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M64,45 Q71,42 78,45" stroke="#1A0808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Sourcils bruns bien dessinés -->
  <path d="M43,43 Q49,41 55,43" stroke="#2A1008" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M65,43 Q71,41 77,43" stroke="#2A1008" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Nez petit et fin -->
  <path d="M60,54 Q58,59 57,61 Q60,62.5 63,61 Q62,59 60,54" fill="none" stroke="#A07050" stroke-width="1" stroke-linecap="round"/>
  <!-- Sourire jeune et radieux -->
  <path d="M52,67 Q60,72 68,67" stroke="#903040" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Fossettes légères -->
  <circle cx="52" cy="68" r="1.2" fill="#B07060" opacity="0.4"/>
  <circle cx="68" cy="68" r="1.2" fill="#B07060" opacity="0.4"/>
</svg>
