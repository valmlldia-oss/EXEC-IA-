<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Fond bleu clair -->
  <circle cx="60" cy="60" r="60" fill="#D6E8F4"/>

  <!-- Corps / costume marine -->
  <path d="M20,120 C24,94 40,86 60,84 C80,86 96,94 100,120Z" fill="#243556"/>
  <!-- Chemise blanche -->
  <path d="M55,84 L60,120 L65,84" fill="#F2F2F2"/>
  <!-- Cravate bordeaux fine -->
  <polygon points="60,85 58.5,92 60,94 61.5,92" fill="#7A1520"/>

  <!-- Cou -->
  <rect x="55" y="73" width="10" height="13" rx="4" fill="#C8895A"/>

  <!-- Tête ovale, moins ronde -->
  <ellipse cx="60" cy="54" rx="20" ry="23" fill="#C8895A"/>

  <!-- Cheveux — blond-gris, couvrant bien le crâne -->
  <!-- Calotte principale -->
  <path d="M40,50 C40,28 80,28 80,50 C78,36 62,32 60,32 C58,32 42,36 40,50Z" fill="#C0AE80"/>
  <!-- Côtés -->
  <ellipse cx="40" cy="52" rx="4" ry="11" fill="#B8A070"/>
  <ellipse cx="80" cy="52" rx="4" ry="11" fill="#B8A070"/>
  <!-- Reflets argentés -->
  <path d="M41,44 C44,34 56,30 60,30" fill="none" stroke="#D8D0B8" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <path d="M79,44 C76,34 64,30 60,30" fill="none" stroke="#D8D0B8" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>

  <!-- Oreilles -->
  <ellipse cx="40" cy="55" rx="3.5" ry="5" fill="#B87848"/>
  <ellipse cx="80" cy="55" rx="3.5" ry="5" fill="#B87848"/>

  <!-- Sourcils — fins, horizontaux, naturels -->
  <path d="M47,46 Q53,44.5 58,46" stroke="#8A7848" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M62,46 Q67,44.5 73,46" stroke="#8A7848" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Yeux — taille réduite et réaliste -->
  <ellipse cx="52" cy="53" rx="4.5" ry="3.5" fill="white"/>
  <ellipse cx="68" cy="53" rx="4.5" ry="3.5" fill="white"/>
  <!-- Iris bleu acier -->
  <circle cx="52" cy="53" r="2.8" fill="#2A78C0"/>
  <circle cx="68" cy="53" r="2.8" fill="#2A78C0"/>
  <!-- Pupille -->
  <circle cx="52" cy="53" r="1.3" fill="#102840"/>
  <circle cx="68" cy="53" r="1.3" fill="#102840"/>
  <!-- Reflet -->
  <circle cx="53" cy="52" r="0.7" fill="white"/>
  <circle cx="69" cy="52" r="0.7" fill="white"/>
  <!-- Paupière supérieure -->
  <path d="M47.5,50.5 Q52,48.5 56.5,50.5" stroke="#8A6040" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M63.5,50.5 Q68,48.5 72.5,50.5" stroke="#8A6040" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Nez — sobre, réaliste -->
  <path d="M60,57 L58,63 Q60,64.5 62,63 Z" fill="#B07040" opacity="0.5"/>
  <path d="M57,63 Q60,65 63,63" fill="none" stroke="#A06030" stroke-width="1" stroke-linecap="round"/>

  <!-- Bouche — sourire discret professionnel -->
  <path d="M53.5,70 Q60,74 66.5,70" stroke="#904030" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- Légères ridules, marques d'expérience -->
  <path d="M46,51 Q44,53 46,55" stroke="#B07040" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M74,51 Q76,53 74,55" stroke="#B07040" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.35"/>
</svg>
