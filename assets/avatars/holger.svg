<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- BG bleu clair -->
  <circle cx="60" cy="60" r="60" fill="#D6E8F4"/>
  <!-- Costume bleu marine -->
  <path d="M18,120 C22,96 38,88 60,86 C82,88 98,96 102,120Z" fill="#243556"/>
  <!-- Chemise blanche -->
  <path d="M55,86 L60,120 L65,86" fill="#F0F0F0"/>
  <!-- Cravate -->
  <path d="M59,87 L60,96 L61,87" fill="#8B1A2A"/>
  <!-- Cou -->
  <rect x="56" y="76" width="8" height="12" rx="3" fill="#D09060"/>
  <!-- Tête — plus petite, centrée, bien dans le cercle -->
  <ellipse cx="60" cy="58" rx="18" ry="20" fill="#D09060"/>
  <!-- Cheveux gris-blond -->
  <path d="M42,52 C42,34 78,34 78,52 C75,40 60,38 45,42Z" fill="#BCA878"/>
  <ellipse cx="42" cy="56" rx="3" ry="8" fill="#A89878"/>
  <ellipse cx="78" cy="56" rx="3" ry="8" fill="#A89878"/>
  <!-- Reflets gris aux tempes -->
  <ellipse cx="42" cy="53" rx="2.5" ry="5" fill="#C8C0B0" opacity="0.7"/>
  <ellipse cx="78" cy="53" rx="2.5" ry="5" fill="#C8C0B0" opacity="0.7"/>
  <!-- Oreilles -->
  <ellipse cx="42" cy="59" rx="3" ry="5" fill="#C08050"/>
  <ellipse cx="78" cy="59" rx="3" ry="5" fill="#C08050"/>
  <!-- Yeux très bleus -->
  <ellipse cx="53" cy="57" rx="5" ry="4" fill="white"/>
  <ellipse cx="67" cy="57" rx="5" ry="4" fill="white"/>
  <circle cx="53" cy="57" r="3" fill="#1874CC"/>
  <circle cx="67" cy="57" r="3" fill="#1874CC"/>
  <circle cx="53" cy="57" r="1.3" fill="#0A3870"/>
  <circle cx="67" cy="57" r="1.3" fill="#0A3870"/>
  <circle cx="54.2" cy="55.8" r="0.9" fill="white"/>
  <circle cx="68.2" cy="55.8" r="0.9" fill="white"/>
  <!-- Sourcils gris-blond -->
  <path d="M47,52 Q53,50 59,52" stroke="#A09070" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M61,52 Q67,50 73,52" stroke="#A09070" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Nez -->
  <path d="M60,61 Q58,65 57,67 Q60,68.5 63,67 Q62,65 60,61" fill="none" stroke="#B87040" stroke-width="1" stroke-linecap="round"/>
  <!-- Sourire discret -->
  <path d="M54,73 Q60,77 66,73" stroke="#A06040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
