<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220">

  <!-- ── Cercle (prune) ── -->
  <circle cx="110" cy="110" r="98" fill="none" stroke="#633B4A" stroke-width="4"/>

  <!-- ── Bras gauche du X : terracotta (scaled to fit circle) ── -->
  <rect x="28" y="26" width="52" height="8" rx="2" fill="#C75F62"/>
  <polygon points="32,34 76,34 130,138 86,138" fill="#C75F62"/>

  <!-- ── Bras droit du X : terracotta ── -->
  <polygon points="86,138 130,138 176,200 132,200" fill="#C75F62"/>
  <rect x="128" y="198" width="52" height="8" rx="2" fill="#C75F62"/>

  <!-- ── Trait calligraphique : prune ── -->
  <path d="
    M 138,72
    C 136,96 126,118 116,138
    C 102,162 76,188 52,208
    L 40,204
    C 64,184 90,158 104,134
    C 114,114 124,90 124,68
    Z
  " fill="#633B4A"/>

  <!-- ── Pin IA : terracotta ── -->
  <circle cx="152" cy="38" r="24" fill="#C75F62"/>
  <polygon points="134,56 152,76 170,56" fill="#C75F62"/>
  <text x="152" y="46" text-anchor="middle" fill="white"
    font-family="Georgia, serif" font-size="18" font-weight="600" letter-spacing="1.5">IA</text>

  <!-- ── Texte EXEC'IA ── -->
  <text x="248" y="105" font-family="Georgia, serif" font-size="72" font-weight="400" letter-spacing="2" fill="#633B4A">EXEC<tspan fill="#633B4A">'</tspan><tspan fill="#C75F62">IA</tspan></text>
  <!-- ── CONSULTING ── -->
  <text x="256" y="148" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" letter-spacing="12" fill="#633B4A">CONSULTING</text>

</svg>
